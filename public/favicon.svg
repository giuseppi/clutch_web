<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ball body with subtle gradient -->
  <defs>
    <radialGradient id="g" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FF8C33"/>
      <stop offset="100%" stop-color="#E05500"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#g)"/>

  <!-- Seam lines: classic basketball pattern -->
  <!-- Vertical center seam -->
  <path d="M32 2 L32 62" stroke="#1a1a1a" stroke-width="1.8" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- Horizontal center seam -->
  <path d="M2 32 L62 32" stroke="#1a1a1a" stroke-width="1.8" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- Left curved seam -->
  <path d="M20 3 C8 16, 8 48, 20 61" stroke="#1a1a1a" stroke-width="1.8" stroke-opacity="0.45" fill="none" stroke-linecap="round"/>

  <!-- Right curved seam -->
  <path d="M44 3 C56 16, 56 48, 44 61" stroke="#1a1a1a" stroke-width="1.8" stroke-opacity="0.45" fill="none" stroke-linecap="round"/>

  <!-- Subtle highlight for 3D depth -->
  <circle cx="24" cy="22" r="14" fill="white" opacity="0.08"/>
</svg>
