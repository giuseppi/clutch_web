services:
  postgres:
    image: postgres:16-alpine
    container_name: clutch-postgres
    environment:
      POSTGRES_USER: clutch
      POSTGRES_PASSWORD: clutch_dev
      POSTGRES_DB: clutch
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U clutch']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clutch-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: clutch-minio
    environment:
      MINIO_ROOT_USER: clutch_access
      MINIO_ROOT_PASSWORD: clutch_secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: clutch-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 clutch_access clutch_secret;
      mc mb local/clutch-uploads --ignore-existing;
      mc mb local/clutch-trajectories --ignore-existing;
      mc anonymous set download local/clutch-uploads;
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
